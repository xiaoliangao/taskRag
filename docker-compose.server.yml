services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./backend:/app
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app worker -Q urgent,scheduled,backfill -n worker@%h --loglevel=info --concurrency=1

  worker-intel:
    build:
      context: ./backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./backend:/app
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app worker -Q intelligence -n worker-intel@%h --loglevel=info --concurrency=1

  celery-beat:
    build:
      context: ./backend
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./backend:/app
      - app_data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
    env_file: .env
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  qdrant_data:
  app_data:
  frontend_node_modules:
